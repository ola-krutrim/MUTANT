<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokenizer Comparison Tool</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            box-sizing: border-box;
        }

        .container {
            background: #ffffff;
            padding: 24px 32px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
            width: 100%;
            max-width: 960px;
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 24px;
            text-align: center;
            font-size: 2rem;
            color: #1f2937;
        }

        label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            font: inherit;
            background: #ffffff;
        }

        textarea {
            min-height: 150px;
            resize: vertical;
        }

        textarea:focus,
        select:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .field {
            margin-bottom: 24px;
        }

        .controls {
            display: flex;
            gap: 16px;
            align-items: flex-end;
            margin-bottom: 24px;
        }

        .controls .select-wrap {
            flex: 1;
        }

        .button {
            background: #4f46e5;
            color: #ffffff;
            border: 0;
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: 600;
            cursor: pointer;
            min-width: 160px;
            height: 48px;
            transition: transform 0.15s ease, background 0.15s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .button:hover {
            background: #4338ca;
            transform: scale(1.02);
        }

        .button:disabled {
            opacity: 0.7;
            cursor: wait;
            transform: none;
        }

        .loader {
            border: 4px solid #e5e7eb;
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            color: #dc2626;
            font-size: 0.9rem;
            min-height: 20px;
            margin-bottom: 16px;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .output-header h2 {
            margin: 0;
            font-size: 1.1rem;
            color: #374151;
        }

        .count-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .count-display {
            font-size: 0.9rem;
            color: #4b5563;
        }

        .count-display span {
            font-weight: 600;
            color: #1f2937;
            margin-left: 4px;
        }

        .token-output {
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.8;
            padding: 16px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: #f9fafb;
            min-height: 120px;
            max-height: 320px;
            overflow-y: auto;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .token {
            display: inline-block;
            line-height: 1.6;
            color: #1f2937;
            font-weight: 500;
            white-space: pre;
            transition: transform 0.1s ease-in-out;
        }

        .token:hover {
            transform: scale(1.05);
        }

        .placeholder {
            color: #9ca3af;
        }

        @media (max-width: 640px) {
            .container {
                padding: 20px;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .button {
                width: 100%;
            }

            .output-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tokenizer Comparison Tool</h1>

        <div class="field">
            <label for="inputText">Enter Text:</label>
            <textarea id="inputText" placeholder="Paste or type your text here..."></textarea>
        </div>

        <div class="controls">
            <div class="select-wrap">
                <label for="tokenizerType">Select Tokenizer:</label>
                <select id="tokenizerType">
                    <option value="">Loading tokenizers...</option>
                </select>
            </div>

            <button id="tokenizeButton" class="button" type="button">
                <span>Tokenize</span>
                <span id="loadingIndicator" class="loader"></span>
            </button>
        </div>

        <div id="messageArea" class="message"></div>

        <div>
            <div class="output-header">
                <h2>Tokenized Output:</h2>
                <div class="count-row">
                    <div class="count-display">Words: <span id="wordCountValue">0</span></div>
                    <div class="count-display">Tokens: <span id="tokenCountValue">0</span></div>
                </div>
            </div>
            <div id="tokenOutput" class="token-output">
                <p class="placeholder">Tokens will appear here after processing.</p>
            </div>
        </div>
    </div>

    <script>
        const inputText = document.getElementById("inputText");
        const tokenizerType = document.getElementById("tokenizerType");
        const tokenizeButton = document.getElementById("tokenizeButton");
        const buttonText = tokenizeButton.querySelector("span");
        const loadingIndicator = document.getElementById("loadingIndicator");
        const tokenOutput = document.getElementById("tokenOutput");
        const messageArea = document.getElementById("messageArea");
        const wordCountOutput = document.getElementById("wordCountValue");
        const tokenCountOutput = document.getElementById("tokenCountValue");

        function generateColor(index) {
            const hue = (index * 40) % 360;
            return `hsl(${hue}, 70%, 85%)`;
        }

        async function loadTokenizers() {
            messageArea.textContent = "";
            try {
                const response = await fetch("/api/tokenizers");
                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.error || "Failed to load tokenizers.");
                }

                tokenizerType.innerHTML = "";
                result.tokenizers.forEach((tokenizer, index) => {
                    const option = document.createElement("option");
                    option.value = tokenizer.id;
                    option.textContent = tokenizer.label;
                    option.title = tokenizer.description || tokenizer.label;
                    tokenizerType.appendChild(option);
                    if (index === 0) {
                        tokenizerType.value = tokenizer.id;
                    }
                });
            } catch (error) {
                tokenizerType.innerHTML = '<option value="">No tokenizers available</option>';
                messageArea.textContent = error.message;
            }
        }

        tokenizeButton.addEventListener("click", async () => {
            const text = inputText.value;
            const type = tokenizerType.value;

            messageArea.textContent = "";
            tokenOutput.innerHTML = '<p class="placeholder">Processing...</p>';
            wordCountOutput.textContent = "0";
            tokenCountOutput.textContent = "0";

            if (text.trim().length === 0) {
                messageArea.textContent = "Please enter some text to tokenize.";
                tokenOutput.innerHTML = '<p class="placeholder">Tokens will appear here after processing.</p>';
                return;
            }

            if (!type) {
                messageArea.textContent = "Please select a tokenizer.";
                tokenOutput.innerHTML = '<p class="placeholder">Tokens will appear here after processing.</p>';
                return;
            }

            buttonText.textContent = "Tokenizing...";
            loadingIndicator.style.display = "inline-block";
            tokenizeButton.disabled = true;

            try {
                const response = await fetch("/api/tokenize", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Accept": "application/json"
                    },
                    body: JSON.stringify({
                        text,
                        tokenizerId: type
                    })
                });

                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.error || `Server error: ${response.status}`);
                }

                const tokens = Array.isArray(result.tokens) ? result.tokens : [];
                const wordCount = typeof result.word_count === "number" ? result.word_count : 0;

                wordCountOutput.textContent = String(wordCount);
                tokenCountOutput.textContent = String(tokens.length);
                tokenOutput.innerHTML = "";

                if (tokens.length > 0) {
                    tokens.forEach((token, index) => {
                        const span = document.createElement("span");
                        span.textContent = token;
                        span.className = "token";
                        span.style.backgroundColor = generateColor(index);
                        span.title = `Token ${index + 1}: "${token}"`;
                        tokenOutput.appendChild(span);
                    });
                } else {
                    tokenOutput.innerHTML = '<p class="placeholder">Server returned no tokens for this input.</p>';
                }
            } catch (error) {
                messageArea.textContent = `Error: ${error.message}`;
                tokenOutput.innerHTML = '<p class="placeholder">Failed to fetch tokens.</p>';
                wordCountOutput.textContent = "0";
                tokenCountOutput.textContent = "0";
            } finally {
                buttonText.textContent = "Tokenize";
                loadingIndicator.style.display = "none";
                tokenizeButton.disabled = false;
            }
        });

        loadTokenizers();
    </script>
</body>
</html>
